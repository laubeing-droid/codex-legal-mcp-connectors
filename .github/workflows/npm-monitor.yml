name: NPM Monitor

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  check-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check npm package versions
        id: fetch
        run: |
          CACHE_FILE=".npm-last-check"
          REPORT="## NPM 包更新报告%0A%0A"
          REPORT+="检查时间: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A"
          CHANGED=false

          check_npm() {
            LABEL="$1"
            PKG="$2"
            REPORT+="### $LABEL%0A"
            REPORT+="- npm: $PKG%0A"
            INFO=$(curl -s "https://registry.npmjs.org/$PKG/latest")
            LATEST=$(echo "$INFO" | jq -r '.version // "unknown"')
            DESC=$(echo "$INFO" | jq -r '.description // ""' | head -c 120)
            REPORT+="- 最新版本: $LATEST%0A"
            REPORT+="- 说明: $DESC%0A"
            REPORT+="%0A%0A"
            if [ -f "$CACHE_FILE" ]; then
              OLD=$(grep "^$PKG=" "$CACHE_FILE" 2>/dev/null | cut -d= -f2 || echo "")
              if [ "$OLD" != "$LATEST" ] && [ "$LATEST" != "unknown" ] && [ -n "$LATEST" ]; then
                CHANGED=true
              fi
            else
              CHANGED=true
            fi
          }

          check_npm "chineselaw-mcp（元典智库 MCP）" "chineselaw-mcp"
          check_npm "@pkulaw/mcp-cli（北大法宝 CLI）" "@pkulaw/mcp-cli"

          echo "report=$REPORT" >> $GITHUB_OUTPUT
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Create or update issue
        if: steps.fetch.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = decodeURIComponent('${{ steps.fetch.outputs.report }}');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['npm-update']
            });
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'NPM 包更新通知 - ' + new Date().toISOString().slice(0, 10),
                body: report,
                labels: ['npm-update']
              });
            }

      - name: Cache last versions
        run: |
          CACHE_FILE=".npm-last-check"
          > "$CACHE_FILE"
          for pkg in chineselaw-mcp @pkulaw/mcp-cli; do
            ver=$(curl -s "https://registry.npmjs.org/$pkg/latest" | jq -r '.version // ""')
            if [ -n "$ver" ]; then
              echo "$pkg=$ver" >> "$CACHE_FILE"
            fi
          done
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "$CACHE_FILE"
          git diff --cached --quiet || git commit -m "chore: update npm cache"
          git push